  <body class="bg-slate-950 text-slate-100 selection:bg-emerald-500/20 selection:text-emerald-300 antialiased overscroll-y-none">
    <div id="root"></div>

    <!-- Unregister stale service worker and clear old caches to prevent blank screen traps from previous builds -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (let registration of registrations) {
            registration.unregister().then(() => {
              console.log('Stale service worker unregistered successfully.');
            });
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then((names) => {
          for (let name of names) {
            caches.delete(name);
          }
        });
      }
    </script>
  </body>
